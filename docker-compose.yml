version: '3.9'

services:
  # Web service: FastAPI application server
  # Builds the Docker image from the Dockerfile and runs the Uvicorn server
  # Exposes the application on port 8000 and depends on the PostgreSQL database
  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      # DATABASE_URL is constructed from vars in .env file
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT}/${DB_NAME}

  # Database service: PostgreSQL database
  # Runs the official PostgreSQL 15 image with persistent storage
  # Configuration loaded from .env file and uses docker-entrypoint-initdb.d for schema initialization
  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PORT: ${DB_PORT}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infrastructure/sql_scripts/create_user_table.sql:/docker-entrypoint-initdb.d/create_user_table.sql:ro

volumes:
  db_data:
